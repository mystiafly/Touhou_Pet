<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Rumia Pet</title>
    <link rel="stylesheet" href="/static/css/pet.css?v=0.8.18">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Premium Interactive Network Graph Vis.js -->
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.9/standalone/umd/vis-network.min.js"></script>
</head>
<body>
<div class="pet-container">

    <div id="speech-bubble" class="bubble" style="opacity: 0;">
        <p id="bubble-content">...</p>
    </div>

    <div class="character-wrapper">
        <div id="fav-container" class="fav-container">
            <i class="fas fa-heart"></i> <span id="fav-score">...</span>
        </div>

        <img src="/static/images/rumia_normal.png" id="rumia-img" alt="Rumia" draggable="false">
    </div>

    <!-- 悬浮网易云音乐播放器栏 -->
    <div id="music-player-bar" class="music-player-bar hidden">
        <div class="music-info">
            <i class="fas fa-music pulse-icon"></i>
            <div class="music-text">
                <span id="music-title">未在播放</span>
                <span id="music-artist">-</span>
            </div>
        </div>
        <div class="lyric-container">
            <span id="live-lyrics">让露米娅唱首歌给你听吧...</span>
        </div>
        <div class="music-controls">
            <button id="music-toggle-btn" class="ctrl-btn" title="播放/暂停">
                <i class="fas fa-play"></i>
            </button>
            <button id="music-stop-btn" class="ctrl-btn danger-btn" title="关闭播放器">
                <i class="fas fa-stop"></i>
            </button>
        </div>
    </div>

    <div class="input-bar">
        <button id="settings-btn" class="icon-btn" title="系统设置">
            <i class="fas fa-cog"></i>
        </button>

        <button id="presets-btn" class="icon-btn" title="预置发言">
            <i class="fas fa-comment-dots"></i>
        </button>

        <input type="text" id="pet-input" placeholder="和露米娅说话..." autocomplete="off">

        <!-- 预制发言弹出层 -->
        <div id="presets-popup" class="presets-popup hidden">
            <div class="preset-item" data-text="我现在有点无聊，你逗逗我吧。">
                <i class="fas fa-laugh-beam" style="color: #ffb86c;"></i> 无聊 (逗逗我吧)
            </div>
            <div class="preset-item" data-text="我现在有点不高兴，你安慰安慰我吧。">
                <i class="fas fa-sad-tear" style="color: #8be9fd;"></i> 伤心 (安慰我吧)
            </div>
            <div class="preset-item" data-text="我现在有点性欲，你诱惑诱惑我吧（进行nsfw描述）。">
                <i class="fas fa-heart" style="color: #ff5555;"></i> 色欲 (诱惑我吧)
            </div>
        </div>
    </div>
    <div id="settings-modal" class="settings-modal hidden">
        <div class="settings-content">
            <!-- 1. 主设置视图 -->
            <div id="settings-main-view" class="view-panel">
                <h3>系统设置</h3>
                <div class="settings-list">
                    <button id="open-engine-btn" class="menu-btn primary-btn">
                        <i class="fas fa-brain"></i> 大脑引擎
                    </button>
                    <button id="open-logs-btn" class="menu-btn info-btn">
                        <i class="fas fa-book"></i> 每日回忆 (日记)
                    </button>
                    <button id="open-graph-btn" class="menu-btn success-btn">
                        <i class="fas fa-project-diagram"></i> 记忆图谱
                    </button>
                    <button id="exit-game-btn" class="menu-btn danger">
                        <i class="fas fa-power-off"></i> 退出游戏
                    </button>
                </div>
                <button id="close-settings-btn" class="close-btn">关闭</button>
            </div>

            <!-- 2. 大脑引擎配置视图 (默认隐藏) -->
            <div id="settings-engine-view" class="view-panel hidden">
                <h3><i class="fas fa-brain"></i> 大脑引擎配置</h3>
                <div class="settings-list">
                    <div class="settings-item">
                        <label for="api-provider-select">选择AI大脑:</label>
                        <select id="api-provider-select" class="settings-select">
                            <option value="gemini">Gemini 2.5 Flash</option>
                            <option value="deepseek-v4-flash">DeepSeek V4 Flash</option>
                            <option value="deepseek-v4-pro">DeepSeek V4 Pro</option>
                            <option value="deepseek-chat">DeepSeek V3 (标准版)</option>
                        </select>
                    </div>
                    <p class="settings-desc">切换大脑后，露米娅的思考广度与对话情绪特征将会实时发生改变哦！</p>
                </div>
                <button id="back-engine-btn" class="menu-btn small-btn">
                    <i class="fas fa-arrow-left"></i> 返回设置
                </button>
            </div>

            <!-- 3. 日记浏览视图 (默认隐藏) -->
            <div id="settings-logs-view" class="view-panel hidden">
                <h3><i class="fas fa-book"></i> 每日回忆</h3>
                <div class="logs-container">
                    <div class="logs-sidebar">
                        <label for="log-date-select">选择日期:</label>
                        <select id="log-date-select" class="settings-select">
                            <option value="">暂无记录...</option>
                        </select>
                    </div>
                    <div class="log-content-wrapper">
                        <!-- Sub-tab Switcher -->
                        <div class="log-subtabs">
                            <button id="subtab-chat" class="subtab-btn active">聊天对话</button>
                            <button id="subtab-diary" class="subtab-btn">露米娅日记</button>
                        </div>
                        <div class="log-text-area-wrapper">
                            <pre id="log-content-area">请选择一个日期来查阅你和露米娅的聊天回忆...</pre>
                        </div>
                    </div>
                </div>
                <div class="logs-action-bar">
                    <button id="back-settings-btn" class="menu-btn small-btn" style="margin: 0;">
                        <i class="fas fa-arrow-left"></i> 返回设置
                    </button>
                    <button id="rewrite-diary-btn" class="menu-btn small-btn info-btn" style="margin: 0; display: none;">
                        <i class="fas fa-sync-alt"></i> 重写这天日记
                    </button>
                </div>
            </div>

            <!-- 4. 记忆图谱视图 (默认隐藏) -->
            <div id="settings-graph-view" class="view-panel hidden">
                <h3><i class="fas fa-project-diagram"></i> 记忆关系图谱</h3>
                <div class="graph-layout">
                    <div class="graph-controls-bar">
                        <button id="manual-distill-btn" class="menu-btn small-btn success-btn">
                            <i class="fas fa-sync-alt"></i> 整理今日记忆
                        </button>
                        <button id="seed-test-btn" class="menu-btn small-btn info-btn">
                            <i class="fas fa-plus"></i> 注入测试记忆
                        </button>
                    </div>
                    <div class="graph-container-wrapper">
                        <div id="graph-canvas-container"></div>
                        <!-- Glassmorphic floating legend and info card -->
                        <div class="graph-legend">
                            <span class="legend-item"><span class="legend-color pink"></span>回忆事记</span>
                            <span class="legend-item"><span class="legend-color blue"></span>关联词/实体</span>
                        </div>
                        <div id="graph-info-card" class="graph-info-card hidden">
                            <h4 id="info-node-title">节点详情</h4>
                            <p id="info-node-content">点击图谱中的节点查看详细的记忆事实和关联信息...</p>
                        </div>
                    </div>
                </div>
                <button id="back-graph-btn" class="menu-btn small-btn">
                    <i class="fas fa-arrow-left"></i> 返回设置
                </button>
            </div>
        </div>
    </div>
</div>

<script src="/static/js/pet_script.js?v=0.8.18"></script>
</body>
</html>
