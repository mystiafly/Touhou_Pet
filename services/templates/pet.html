<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Desktop Pet</title>
    <link rel="stylesheet" href="/static/css/pet.css?v=1.1.6">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Premium Interactive Network Graph Vis.js -->
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.9/standalone/umd/vis-network.min.js"></script>
</head>
<body>
<div class="pet-container">
    <div id="debug-coord-panel" style="display: none; position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.85); color: #50fa7b; font-family: monospace; font-size: 11px; z-index: 99999; pointer-events: none; padding: 6px; border-radius: 4px; border: 1px solid #ff5555; line-height: 1.4;">
        Mouse: <span id="debug-mouse-val">N/A</span><br>
        ImgRect: <span id="debug-rect-val">N/A</span><br>
        Interactive: <span id="debug-interactive-val">N/A</span><br>
        Ignoring: <span id="debug-ignoring-val">N/A</span>
    </div>

    <div id="speech-bubble" class="bubble" style="opacity: 0;">
        <p id="bubble-content">...</p>
    </div>

    <div class="character-wrapper">
        <div id="fav-container" class="fav-container">
            <i class="fas fa-heart"></i> <span id="fav-score">...</span>
        </div>

        <img src="/static/images/rumia_normal.png" id="pet-img" alt="Pet" draggable="false">
    </div>

    <!-- 悬浮网易云音乐播放器栏 -->
    <div id="music-player-bar" class="music-player-bar hidden">
        <div class="music-info">
            <i class="fas fa-music pulse-icon"></i>
            <div class="music-text">
                <span id="music-title">未在播放</span>
                <span id="music-artist">-</span>
            </div>
        </div>
        <div class="lyric-container">
            <span id="live-lyrics">当前未播放音乐</span>
        </div>
        <div class="music-controls">
            <button id="music-toggle-btn" class="ctrl-btn" title="播放/暂停">
                <i class="fas fa-play"></i>
            </button>
            <button id="music-stop-btn" class="ctrl-btn danger-btn" title="关闭播放器">
                <i class="fas fa-stop"></i>
            </button>
        </div>
    </div>

    <div class="input-bar">
        <button id="settings-btn" class="icon-btn" title="系统设置">
            <i class="fas fa-cog"></i>
        </button>

        <button id="presets-btn" class="icon-btn" title="预置发言">
            <i class="fas fa-comment-dots"></i>
        </button>

        <input type="text" id="pet-input" placeholder="和她说话..." autocomplete="off">

        <!-- 预制发言弹出层 -->
        <div id="presets-popup" class="presets-popup hidden">
            <div class="preset-item" data-text="我现在有点无聊，你逗逗我吧。">
                <i class="fas fa-laugh-beam" style="color: #ffb86c;"></i> 无聊 (逗逗我吧)
            </div>
            <div class="preset-item" data-text="我现在有点不高兴，你安慰安慰我吧。">
                <i class="fas fa-sad-tear" style="color: #8be9fd;"></i> 伤心 (安慰我吧)
            </div>
            <div class="preset-item" data-text="我现在有点性欲，你诱惑诱惑我吧（进行nsfw描述）。">
                <i class="fas fa-heart" style="color: #ff5555;"></i> 色欲 (诱惑我吧)
            </div>
        </div>
    </div>
    <div id="settings-modal" class="settings-modal hidden">
        <div class="settings-content">
            <!-- 1. 主设置视图 -->
            <div id="settings-main-view" class="view-panel">
                <h3>系统设置</h3>
                <div class="settings-list">
                    <button id="open-dashboard-btn" class="menu-btn primary-btn">
                        <i class="fas fa-sliders-h"></i> 大贤者控制台
                    </button>

                    <button id="minimize-btn" class="menu-btn warning-btn">
                        <i class="fas fa-minus"></i> 最小化至托盘
                    </button>
                    <button id="exit-game-btn" class="menu-btn danger">
                        <i class="fas fa-power-off"></i> 退出游戏
                    </button>
                </div>
                <button id="close-settings-btn" class="close-btn">关闭</button>
            </div>


        </div>
    </div>
</div>

<script src="/static/js/pet_script.js?v=1.2.0"></script>
</body>
</html>
